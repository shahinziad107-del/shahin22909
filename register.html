<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - أجرلي Ajarli</title>
    
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./static/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 20px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .form-control:focus {
            box-shadow: none;
            border-color: var(--secondary-color);
        }
    </style>
</head>
<body>

    <div class="login-card reveal shadow-lg">
        <div class="mb-4">
             <img src="./static/img/logo.png" alt="Logo" height="60" style="border-radius: 12px; margin-bottom: 15px;">
             <h2 class="fw-bold mb-0">إنشاء حساب جديد</h2>
             <p class="text-muted">انضم إلينا لتبدأ إدارة عقاراتك بفاعلية</p>
        </div>

        <form id="register-form">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold text-muted small">الاسم الكامل <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-regular fa-user"></i></span>
                    <input type="text" id="reg-name" class="form-control border-start-0" placeholder="أحمد محمد" required>
                </div>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label fw-bold text-muted small">البريد الإلكتروني <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-regular fa-envelope"></i></span>
                    <input type="email" id="reg-email" class="form-control border-start-0" placeholder="user@example.com" required>
                </div>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label fw-bold text-muted small">كلمة المرور (6 أحرف أو أكثر) <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="reg-password" class="form-control border-start-0" placeholder="••••••••" required minlength="6">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold fs-5 shadow-sm">
                تسجيل الحساب <i class="fa-solid fa-user-plus ms-2"></i>
            </button>
        </form>
        
        <p class="mt-4 text-muted">لديك حساب بالفعل؟ <a href="index.html" class="text-decoration-none fw-bold text-primary">سجل الدخول</a></p>
    </div>

    <!-- Custom JS -->
    <script src="./static/js/main.js"></script>
    <script type="module" src="./static/js/firebase-app.js"></script>
</body>
</html>
