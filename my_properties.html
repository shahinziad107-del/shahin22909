<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عقاراتي - أجرلي Ajarli</title>
    
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./static/css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="home.html">
                <img src="./static/img/logo.png" alt="Logo" height="30" class="ms-1" style="border-radius: 8px;">
                أجرلي <span class="fw-normal fs-6 text-muted me-1">Ajarli</span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fa-solid fa-bars fs-2 text-primary"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="fa-solid fa-magnifying-glass ms-1"></i>بحث</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="fa-solid fa-phone ms-1"></i>تواصل معنا</a>
                    </li>
                </ul>
                <div class="d-flex gx-2">
                    <a href="account.html" class="btn btn-outline-primary ms-2 rounded-pill px-4 active"><i class="fa-regular fa-user ms-1"></i> حسابي</a>
                    <a href="add_property.html" class="btn btn-primary rounded-pill px-4 shadow-sm">إضافة عقار</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main style="padding-top: 80px; min-height: 80vh;">
        <div class="container reveal mt-4 pb-5">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <h2 class="fw-bold fs-3 text-dark mb-0">
                    <i class="fa-solid fa-building-user text-primary ms-2"></i> إدارة عقاراتي
                </h2>
                <a href="add_property.html" class="btn btn-outline-primary rounded-pill fw-bold">
                    <i class="fa-solid fa-plus ms-1"></i> إضافة عقار جديد
                </a>
            </div>

            <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="properties-container">
                <!-- Dummy Property -->
                <div class="col reveal">
                    <div class="property-card">
                        <div class="card-img-wrapper" style="height: 180px;">
                            <span class="price-tag bg-primary">2,500,000 ج.م</span>
                            <div class="property-image bg-secondary d-flex justify-content-center align-items-center text-white flex-column">
                                <i class="fa-solid fa-image fs-1 mb-2 opacity-50"></i>
                            </div>
                        </div>
                        <div class="card-body container-fluid p-3">
                            <h4 class="card-title text-truncate mb-2 fs-5">فيلا مع مسبح خاص</h4>
                            <div class="location-text mb-0 small">
                                <i class="fa-solid fa-location-dot"></i> القاهرة الجديدة
                            </div>
                        </div>
                        <div class="card-footer bg-light border-top-0 d-flex justify-content-between align-items-center p-3 gap-2">
                            <a href="#" class="btn btn-sm btn-outline-secondary rounded-pill flex-grow-1">
                                <i class="fa-regular fa-eye ms-1"></i> عرض
                            </a>
                            <button class="btn btn-sm btn-warning rounded-pill flex-grow-1 text-white">
                                <i class="fa-regular fa-pen-to-square ms-1"></i> تعديل
                            </button>
                            <button class="btn btn-sm btn-danger rounded-pill">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center">
        <div class="container">
            <p class="mb-0">© 2026 أجرلي Ajarli. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="./static/js/main.js"></script>
    <script type="module" src="./static/js/firebase-app.js"></script>
</body>
</html>
