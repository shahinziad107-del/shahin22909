<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الموقع - أجرلي Ajarli</title>
    
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./static/css/style.css">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top bg-dark border-bottom border-danger" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand text-white" href="home.html">
                <i class="fa-solid fa-shield-halved text-danger me-1 ms-1"></i>
                أجرلي <span class="fw-bold text-danger">ADMIN</span>
            </a>
            <div class="d-flex gx-2">
                <a href="home.html" class="btn btn-outline-light ms-2 rounded-pill px-4"><i class="fa-solid fa-house ms-1"></i> العودة للموقع</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main style="padding-top: 100px; min-height: 80vh;" class="bg-light">
        <div class="container reveal mt-4 pb-5">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-4 border-danger">
                <div>
                    <h2 class="fw-bold fs-3 text-dark mb-1">
                        <i class="fa-solid fa-user-shield text-danger ms-2"></i> لوحة تحكم المسئول
                    </h2>
                    <p class="text-muted mb-0">يمكنك هنا مراجعة كافة عقارات المستخدمين وحذف المخالف منها.</p>
                </div>
            </div>

            <!-- Dashboard Stats -->
            <div class="row mb-5 g-3">
                <div class="col-md-4">
                    <div class="p-4 bg-white border-start border-4 border-danger rounded shadow-sm">
                        <h6 class="text-muted fw-bold">إجمالي العقارات النشطة</h6>
                        <h3 class="fw-bold mb-0 text-danger" id="total-properties-count"><i class="fa-solid fa-spinner fa-spin fs-4 text-muted"></i></h3>
                    </div>
                </div>
            </div>

            <!-- Admin Properties List -->
            <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="admin-properties-container">
                <div class="col-12 text-center py-5 w-100">
                    <div class="spinner-border text-danger"></div>
                    <p class="text-muted mt-2">جاري تحميل بيانات الموقع...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center bg-dark text-white shadow-lg mt-auto">
        <div class="container py-4">
            <p class="mb-0 text-muted">© 2026 أجرلي Ajarli - Admin Dashboard</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./static/js/main.js"></script>
    <script type="module" src="./static/js/firebase-app.js"></script>
</body>
</html>
