<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الموقع - أجرلي Ajarli</title>
    
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./static/css/style.css">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar fixed-top bg-dark border-bottom border-danger" data-bs-theme="dark" style="padding: 10px 0;">
        <div class="container d-flex justify-content-between align-items-center">
            
            <!-- Admin Profile Pic -->
            <div class="d-flex align-items-center">
                <div id="admin-avatar-nav" style="width: 45px; height: 45px; border-radius: 50%; background: #444; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: 2px solid var(--bs-danger); box-shadow: 0 2px 10px rgba(220,53,69,0.3);">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
            </div>

            <!-- Settings & Logout -->
            <div class="d-flex align-items-center gap-4">
                <a href="#" class="text-white fs-4" title="الإعدادات"><i class="fa-solid fa-gear"></i></a>
                <a href="#" id="admin-logout-top-btn" class="text-danger fs-4" title="تسجيل الخروج"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
            </div>
            
        </div>
    </nav>

    <!-- Main Content -->
    <main style="padding-top: 100px; min-height: 80vh;" class="bg-light">
        <div class="container reveal mt-4 pb-5">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-4 border-danger">
                <div>
                    <h2 class="fw-bold fs-3 text-dark mb-1">
                        <i class="fa-solid fa-user-shield text-danger ms-2"></i> لوحة تحكم المسئول
                    </h2>
                    <p class="text-muted mb-0">يمكنك هنا مراجعة كافة عقارات المستخدمين وحذف المخالف منها.</p>
                </div>
            </div>

            <!-- Dashboard Stats -->
            <div class="row mb-5 g-3">
                <div class="col-md-4">
                    <div class="p-4 bg-white border-start border-4 border-danger rounded shadow-sm">
                        <h6 class="text-muted fw-bold">إجمالي العقارات النشطة</h6>
                        <h3 class="fw-bold mb-0 text-danger" id="total-properties-count"><i class="fa-solid fa-spinner fa-spin fs-4 text-muted"></i></h3>
                    </div>
                </div>
            </div>

            <!-- Admin Properties List -->
            <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="admin-properties-container">
                <div class="col-12 text-center py-5 w-100">
                    <div class="spinner-border text-danger"></div>
                    <p class="text-muted mt-2">جاري تحميل بيانات الموقع...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center bg-dark text-white shadow-lg mt-auto">
        <div class="container py-4">
            <p class="mb-0 text-muted">© 2026 أجرلي Ajarli - Admin Dashboard</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./static/js/main.js"></script>
    <script type="module" src="./static/js/firebase-app.js"></script>

    <!-- Mobile Bottom Nav -->
    <div class="mobile-bottom-nav d-lg-none" style="justify-content: space-around;">
        <a href="home.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-magnifying-glass"></i>
        </a>
        <a href="admin_panel.html" class="nav-item center-add-btn active">
            <div class="add-btn-inner" style="background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%); border-color: #dc3545; box-shadow: 0 6px 16px rgba(220, 53, 69, 0.4);">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-phone"></i>
        </a>
    </div>

</body>
</html>
