<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الحساب - أجرلي Ajarli</title>
    
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./static/css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="home.html">
                <img src="./static/img/logo.png" alt="Logo" height="30" class="ms-1" style="border-radius: 8px;">
                أجرلي <span class="fw-normal fs-6 text-muted me-1">Ajarli</span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fa-solid fa-bars fs-2 text-primary"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="fa-solid fa-magnifying-glass ms-1"></i>بحث</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="fa-solid fa-phone ms-1"></i>تواصل معنا</a>
                    </li>
                </ul>
                <div class="d-flex gx-2">
                    <a href="account.html" class="btn btn-outline-primary ms-2 rounded-pill px-4"><i class="fa-regular fa-user ms-1"></i> حسابي</a>
                    <a href="add_property.html" class="btn btn-primary rounded-pill px-4 shadow-sm">إضافة عقار</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main style="padding-top: 100px; min-height: 80vh;" class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="detail-card reveal mb-5 p-4 p-md-5">
                    <h2 class="fw-bold mb-4 border-bottom pb-3"><i class="fa-solid fa-gear text-secondary ms-2"></i>إعدادات الحساب</h2>
                    
                    <form id="settings-form">
                        <!-- Avatar Display & Input -->
                        <div class="text-center mb-4">
                            <label for="profile-pic-input" style="cursor: pointer;">
                                <div id="avatar-preview" style="width: 120px; height: 120px; border-radius: 50%; background: var(--secondary-color); color: white; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto; box-shadow: var(--shadow-md); background-size: cover; background-position: center;">
                                    <i class="fa-solid fa-camera"></i>
                                </div>
                                <span class="d-block mt-2 text-primary fw-bold"><i class="fa-solid fa-pen ms-1"></i> تغيير الصورة الشخصية</span>
                            </label>
                            <input type="file" id="profile-pic-input" accept="image/png, image/jpeg, image/webp" class="d-none">
                        </div>

                        <!-- Name Input -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">اسم المستخدِم <span class="text-danger">*</span></label>
                            <input type="text" id="display-name" class="form-control px-3 py-2 border rounded-3" placeholder="الاسم الذي سيظهر للناس على عقاراتك">
                        </div>
                        
                        <!-- Submit -->
                        <div class="mt-5">
                            <button type="submit" id="save-settings-btn" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm py-3">حفظ التعديلات <i class="fa-regular fa-floppy-disk ms-2"></i></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center bg-dark text-white shadow-lg mt-auto">
        <div class="container py-4">
            <p class="mb-0 text-muted">© 2026 أجرلي Ajarli - صفحة الإعدادات</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./static/js/main.js"></script>
    <script type="module" src="./static/js/firebase-app.js"></script>
</body>
</html>
