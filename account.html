<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي - أجرلي Ajarli</title>
    
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./static/css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="home.html">
                <img src="./static/img/logo.png" alt="Logo" height="30" class="ms-1" style="border-radius: 8px;">
                أجرلي <span class="fw-normal fs-6 text-muted me-1">Ajarli</span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fa-solid fa-bars fs-2 text-primary"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="fa-solid fa-magnifying-glass ms-1"></i>بحث</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="fa-solid fa-phone ms-1"></i>تواصل معنا</a>
                    </li>
                </ul>
                <div class="d-flex gx-2">
                    <a href="account.html" class="btn btn-outline-primary ms-2 rounded-pill px-4 active"><i class="fa-regular fa-user ms-1"></i> حسابي</a>
                    <a href="add_property.html" class="btn btn-primary rounded-pill px-4 shadow-sm">إضافة عقار</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main style="padding-top: 80px; min-height: 80vh;">
        <div class="container reveal mt-5 pt-3">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="detail-card text-center pb-5">
                        <!-- Avatar -->
                        <div class="mb-4">
                            <div style="width: 120px; height: 120px; border-radius: 50%; background: var(--secondary-color); color: white; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto; box-shadow: var(--shadow-md);">
                                <i class="fa-regular fa-user"></i>
                            </div>
                        </div>
                        
                        <h2 class="fw-bold mb-1">المدير العام</h2>
                        <p class="text-muted fs-5 mb-4 border-bottom pb-4">
                            <i class="fa-solid fa-envelope mx-2"></i>
                            admin@ajarli.com
                        </p>

                        <!-- Profile Actions -->
                        <div class="d-flex flex-column gap-3 px-4">
                            <a href="my_properties.html" class="btn btn-light border p-3 rounded-3 text-start d-flex align-items-center justify-content-between">
                                <div>
                                    <i class="fa-solid fa-house text-primary ms-2 fs-5"></i> عقاراتي
                                </div>
                                <i class="fa-solid fa-chevron-left text-muted"></i>
                            </a>
                            <a href="#" class="btn btn-light border p-3 rounded-3 text-start d-flex align-items-center justify-content-between">
                                <div>
                                    <i class="fa-solid fa-gear text-secondary ms-2 fs-5"></i> إعدادات الحساب
                                </div>
                                <i class="fa-solid fa-chevron-left text-muted"></i>
                            </a>
                            
                            <hr class="my-2">
                            
                            <a href="#" class="btn btn-danger p-3 rounded-3 shadow-sm d-flex align-items-center gap-2 justify-content-center">
                                <i class="fa-solid fa-arrow-right-from-bracket"></i> تسجيل الخروج
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center">
        <div class="container">
            <div class="mb-4">
                <a href="#" class="text-white text-decoration-none mx-2 fs-4"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" class="text-white text-decoration-none mx-2 fs-4"><i class="fa-brands fa-twitter"></i></a>
                <a href="#" class="text-white text-decoration-none mx-2 fs-4"><i class="fa-brands fa-instagram"></i></a>
            </div>
            <p class="mb-0">© 2026 أجرلي Ajarli. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="./static/js/main.js"></script>
</body>
</html>
