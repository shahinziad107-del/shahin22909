{% extends 'listings/base.html' %}
{% load static %}

{% block title %}إضافة عقار - أجرلي Ajarli{% endblock %}

{% block content %}
<div class="container mt-4 pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="detail-card reveal mb-5 shadow-sm">
                <h2 class="fw-bold mb-4 border-bottom pb-3"><i class="fa-solid fa-house-medical text-primary ms-2"></i>إضافة عقار جديد</h2>
                
                <form action="{% url 'property_list' %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-4">
                        <!-- Title -->
                        <div class="col-12">
                            <label class="form-label fw-bold">عنوان العقار <span class="text-danger">*</span></label>
                            <input type="text" name="title" class="form-control px-3 py-2 border rounded-3" placeholder="مثال: شقة سوبر لوكس للايجار" required>
                        </div>
                        
                        <!-- Location & Price -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">السعر (بالجنيه المصري) <span class="text-danger">*</span></label>
                            <input type="number" name="price" class="form-control px-3 py-2 border rounded-3" placeholder="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">المدينة / الموقع <span class="text-danger">*</span></label>
                            <input type="text" name="location" class="form-control px-3 py-2 border rounded-3" placeholder="المعادي، القاهرة" required>
                        </div>
                        
                        <!-- Description -->
                        <div class="col-12">
                            <label class="form-label fw-bold">تفاصيل العقار <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control px-3 py-2 border rounded-3" rows="5" placeholder="اكتب وصفاً دقيقاً حول عدد الغرف والمميزات..." required></textarea>
                        </div>
                        
                        <!-- Image Upload -->
                        <div class="col-12">
                            <label class="form-label fw-bold">صور العقار</label>
                            <div class="border rounded-3 p-5 text-center bg-light" style="border-style: dashed !important; border-width: 2px !important;">
                                <i class="fa-solid fa-cloud-arrow-up fs-1 text-muted mb-2"></i>
                                <h5 class="text-muted">اضغط هنا أو اسحب الصور للإرفاق</h5>
                                <input type="file" name="image" class="form-control mt-3 mx-auto w-75">
                            </div>
                        </div>
                        
                        <!-- Submit -->
                        <div class="col-12 mt-5">
                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm py-3">نشر العقار الآن <i class="fa-regular fa-paper-plane ms-2"></i></button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
